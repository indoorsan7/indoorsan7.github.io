<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>認証完了</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes scaleIn {
            0% { transform: scale(0); opacity: 0; }
            60% { transform: scale(1.1); }
            100% { transform: scale(1); opacity: 1; }
        }
        .animate-scale-in {
            animation: scaleIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
    </style>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen m-0">

    <div class="text-center p-8 bg-white rounded-2xl shadow-sm border border-gray-100 max-w-sm w-full mx-4">
        <!-- Success Icon (SVG) -->
        <div class="flex justify-center mb-6">
            <div class="w-20 h-20 bg-green-100 rounded-full flex items-center justify-center animate-scale-in">
                <svg class="w-10 h-10 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path>
                </svg>
            </div>
        </div>

        <!-- Main Message -->
        <h1 class="text-2xl font-bold text-gray-800 mb-2">
            認証が完了しました
        </h1>
        
        <p class="text-gray-500 text-sm">
            アカウントの有効化に成功しました。
        </p>

        <!-- Optional Action Button -->
        <div class="mt-8">
            <button onclick="window.close()" class="w-full py-3 px-4 bg-gray-900 hover:bg-black text-white font-medium rounded-xl transition-all duration-200 focus:ring-2 focus:ring-offset-2 focus:ring-gray-900">
                閉じる
            </button>
        </div>
    </div>

</body>
</html>
